    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:radial-gradient(circle at top, rgba(212,175,55,.18), transparent 34%);
      pointer-events:none;
      z-index:0;
    }
    .app{
      position:relative;
      z-index:1;
      max-width:1120px;
      margin:0 auto;
      padding:18px 16px 32px;
    }
    .top-tabs, .sub-tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .tab{
      border:1px solid rgba(212,175,55,.45);
      background:rgba(20,11,11,.88);
      color:#f8ead2;
      border-radius:14px;
      padding:10px 16px;
      cursor:pointer;
      font-size:15px;
      backdrop-filter: blur(6px);
      box-shadow:0 4px 12px rgba(0,0,0,.18);
    }
    .tab.active{
      background:linear-gradient(180deg, #b51f22, #7b1013);
      color:#fff7e8;
      border-color:#d4af37;
    }
    .tab.disabled{
      color:#c5b79a;
      background:rgba(40,32,30,.6);
      cursor:not-allowed;
      opacity:.7;
    }
    .panel{
      background:rgba(9,9,9,.78);
      border:1px solid rgba(212,175,55,.36);
      border-radius:24px;
      padding:16px;
      min-height:640px;
      box-shadow:0 10px 26px rgba(0,0,0,.35);
      backdrop-filter: blur(5px);
    }
    .prompt-wrap{
      min-height:92px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:10px;
      overflow:hidden;
      background:rgba(77,12,15,.76);
      border:1px solid rgba(212,175,55,.35);
      border-radius:20px;
      padding:12px 16px;
    }
    .prompt{
      font-size:34px;
      text-align:center;
      line-height:1.45;
      color:#fff6ea;
      text-shadow:0 1px 1px rgba(0,0,0,.4);
      transform:translateX(60px);
      opacity:0;
      animation:slideIn .45s ease forwards;
    }
    @keyframes slideIn{
      from{transform:translateX(60px);opacity:0}
      to{transform:translateX(0);opacity:1}
    }
    .mini{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      margin-bottom:14px;
      min-height:20px;
    }
    .assembly{
      min-height:78px;
      border:2px dashed rgba(212,175,55,.36);
      border-radius:18px;
      background:rgba(255,248,235,.92);
      color:#2b1b1b;
      padding:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-start;
      margin-bottom:14px;
    }
    .token{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(0,0,0,.10);
      color:#1f2937;
      border-radius:14px;
      padding:10px 14px;
      font-size:28px;
      line-height:1.2;
      cursor:pointer;
      user-select:none;
      transition:transform .08s ease, filter .15s ease, box-shadow .15s ease;
      white-space:nowrap;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
    }
    .token:hover{transform:translateY(-1px); filter:brightness(1.03)}
    .token.small{font-size:24px;padding:10px 12px;}
    .assembly .token{background:#f4ead9;}
    .banks{display:grid;grid-template-columns:1fr;gap:10px;}
    .bank{
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      padding:10px 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }
    .bank:nth-child(1){background:rgba(122,22,28,.92);}
    .bank:nth-child(2){background:rgba(17,95,96,.92);}
    .bank:nth-child(3){background:rgba(101,57,124,.92);}
    .bank:nth-child(4){background:rgba(127,89,27,.92);}
    .bank:nth-child(5){background:rgba(59,83,28,.92);}
    .bank-title{
      font-size:13px;
      color:#fff2d5;
      margin-bottom:10px;
      letter-spacing:.03em;
      font-weight:700;
    }
    .bank-list{display:flex;gap:10px;flex-wrap:wrap;}
    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:18px 0 8px;
    }
    .btn{
      border:1px solid rgba(212,175,55,.42);
      background:rgba(255,248,235,.94);
      color:#2f221f;
      border-radius:14px;
      padding:10px 16px;
      font-size:15px;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,.12);
    }
    .btn.primary{
      background:linear-gradient(180deg, #bf1f22, #7b1013);
      color:#fff7e8;
      border-color:#d4af37;
    }
    .result{
      min-height:32px;
      font-size:17px;
      margin-top:8px;
      font-weight:700;
    }
    .result.ok{color:#b9fbc0}
    .result.err{color:#fecaca}
    .answer-box{
      margin-top:12px;
      padding:12px 14px;
      background:rgba(12,68,50,.92);
      border:1px solid rgba(110,231,183,.55);
      border-radius:16px;
      display:none;
      font-size:28px;
      line-height:1.45;
      color:#f3fff7;
    }
    .placeholder{
      min-height:420px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fff1d4;
      font-size:22px;
      border:2px dashed rgba(212,175,55,.35);
      border-radius:20px;
      background:rgba(40,16,18,.75);
      padding:20px;
    }
    #fxCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:20;
      display:none;
    }
    @media (max-width: 720px){
      .prompt{font-size:28px}
      .token{font-size:24px}
      .token.small{font-size:21px}
      .answer-box{font-size:24px}
    }
  </style>

</head>

          }
          fxCtx.beginPath();
          fxCtx.globalAlpha = Math.max(p.life / 60, 0);
          fxCtx.fillStyle = p.color;
          fxCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          fxCtx.fill();
        }
        fxCtx.globalAlpha = 1;
        if (particles.length) rafId = requestAnimationFrame(draw);
      }

      draw();
      fxTimer = setTimeout(stopFireworks, durationMs);
    }

    function getData() {
      if (currentLevel !== 1) return [];
      return currentMode === "r2d" ? level1R2D : level1D2R;
    }

    function currentItem() {
      return getData()[currentIndex];
    }

    function makeToken(text, target = "assembly", extraClass = "") {
      const btn = document.createElement("button");
      btn.className = ("token " + extraClass).trim();
      btn.textContent = text;
      btn.type = "button";
      if (target === "bank") {
        btn.addEventListener("click", () => {
          assembly.push(text);
          renderAssembly();
        });
      } else {
        btn.addEventListener("click", () => {
          const idx = [...assemblyEl.children].indexOf(btn);
          if (idx > -1) {
            assembly.splice(idx, 1);
            renderAssembly();
          }
        });
      }
      return btn;
    }

    function renderBanks() {
      const item = currentItem();
      banksEl.innerHTML = "";
      let lastList = null;

      item.banks.forEach(group => {
        const shouldMergeIntoPrevious = ["结构词", "标点", "干扰项"].includes(group.title) && lastList;

        if (shouldMergeIntoPrevious) {
          group.tokens.forEach(token => lastList.appendChild(makeToken(token, "bank", token.length > 6 ? "small" : "")));
          return;
        }

        const bank = document.createElement("div");
        bank.className = "bank";

        const title = document.createElement("div");
        title.className = "bank-title";
        title.textContent = group.title;
        bank.appendChild(title);

        const list = document.createElement("div");
        list.className = "bank-list";
        group.tokens.forEach(token => list.appendChild(makeToken(token, "bank", token.length > 6 ? "small" : "")));
        bank.appendChild(list);
        banksEl.appendChild(bank);
        lastList = list;
      });
    }

    function renderAssembly() {
      assemblyEl.innerHTML = "";
      assembly.forEach(t => assemblyEl.appendChild(makeToken(t)));
    }

    function showItem() {
      const item = currentItem();
      promptEl.classList.remove("prompt");
      void promptEl.offsetWidth;
      promptEl.classList.add("prompt");
      promptEl.textContent = item.prompt;
      counterEl.textContent = (currentIndex + 1) + " / " + getData().length;
      assembly = [];
      renderAssembly();
      renderBanks();
      resultEl.textContent = "";
      resultEl.className = "result";
      answerBox.style.display = "none";
      answerBox.textContent = "";
      stopFireworks();
      try { okSound.pause(); okSound.currentTime = 0; } catch(e) {}
      try { wrongSound.pause(); wrongSound.currentTime = 0; } catch(e) {}
    }

    function normalize(text) {
      return text.replace(/\s+/g, "").replace(/。$/, "");
    }

    function checkAnswer() {
  const user = normalize(assembly.join(""));
  if (!user) {
    resultEl.textContent = "";
    resultEl.className = "result";
    return;
  }
  const ok = currentItem().answers.some(answer => normalize(answer) === user);
  if (ok) {
    resultEl.textContent = "对";
    resultEl.className = "result ok";
    playSound(okSound, 5000);
    launchFireworks(5000);
  } else {
    resultEl.textContent = "再想一想";
    resultEl.className = "result err";
    playSound(wrongSound);
  }
}

    function showAnswer() {
      answerBox.innerHTML = currentItem().answers.join("<br>");
      answerBox.style.display = "block";
    }

    function nextItem() {
      currentIndex = (currentIndex + 1) % getData().length;
      showItem();
    }

    document.getElementById("undoBtn").addEventListener("click", () => {
      assembly.pop();
      renderAssembly();
    });
    document.getElementById("clearBtn").addEventListener("click", () => {
      assembly = [];
      renderAssembly();
    });
    document.getElementById("checkBtn").addEventListener("click", checkAnswer);
    document.getElementById("answerBtn").addEventListener("click", showAnswer);
    document.getElementById("nextBtn").addEventListener("click", nextItem);

    document.querySelectorAll(".top-tabs .tab").forEach(tab => {
      tab.addEventListener("click", () => {
        if (tab.classList.contains("disabled")) return;
        document.querySelectorAll(".top-tabs .tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentLevel = Number(tab.dataset.level);
        currentIndex = 0;
        refreshPanels();
      });
    });

    document.querySelectorAll(".sub-tabs .tab").forEach(tab => {
      tab.addEventListener("click", () => {
        if (tab.classList.contains("disabled")) return;
        document.querySelectorAll(".sub-tabs .tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentMode = tab.dataset.mode;
        currentIndex = 0;
        refreshPanels();
      });
    });

    function refreshPanels() {
      const main = document.getElementById("panel-main");
      const placeholder = document.getElementById("panel-placeholder");
      if (currentLevel === 1) {
        main.style.display = "block";
        placeholder.style.display = "none";
        showItem();
      } else {
        main.style.display = "none";
        placeholder.style.display = "block";
      }
    }

    refreshPanels();
  </script>
</body>
</html>
